<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>한글JS 예제</title>
  <!-- 단 한 줄이면 끝. 빌드도 번들러도 필요 없다. -->
  <script src="../hangul.js"></script>
</head>
<body>
  <h1>한글JS — 개발자 콘솔(F12)도 같이 열어보세요</h1>
  <ul id="목록"></ul>

  <!-- type="text/hangul" 블록은 페이지 로드 시 자동으로 변환·실행된다. -->
  <script type="text/hangul">
    콘스트 사람들 = ["철수", "영희", "민수"];
    콘스트 목록 = 도큐먼트.겟엘리먼트바이아이디("목록");

    사람들.포이치((이름) => {
      콘스트 항목 = 도큐먼트.크리에이트엘리먼트("li");
      항목.텍스트콘텐트 = `안녕, ${이름}!`;
      목록.어펜드차일드(항목);
      콘솔.로그(`추가됨: ${이름}`);
    });
  </script>
</body>
</html>
